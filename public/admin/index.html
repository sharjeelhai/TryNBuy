<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TryNBuy Admin</title>
  <link rel="stylesheet" href="/admin/style.css" />
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div>
        <div class="brand">
          <div class="brand-mark">TN</div>
          <span class="brand-text">TryNBuy</span>
        </div>
        <p class="muted">Admin panel for products, orders, and users.</p>
      </div>
      <nav class="nav">
        <button data-view="dashboard" class="nav-btn active">Dashboard</button>
        <button data-view="products" class="nav-btn">Products</button>
        <button data-view="orders" class="nav-btn">Orders</button>
        <button data-view="users" class="nav-btn">Users</button>
      </nav>
      <div class="sidebar-footer">
        <button id="logoutBtn" class="ghost">Logout</button>
      </div>
    </aside>

    <main class="main">
      <section id="loginView" class="card login-card">
        <h1>Admin Login</h1>
        <p class="muted">Use an account with <strong>role: admin</strong>.</p>
        <form id="loginForm" class="stack">
          <input type="email" id="email" placeholder="Email" required />
          <input type="password" id="password" placeholder="Password" required />
          <button type="submit">Login</button>
        </form>
        <div id="loginMsg" class="message"></div>
      </section>

      <section id="appView" class="hidden">
        <header class="topbar card">
          <div>
            <h1>Admin Dashboard</h1>
            <p class="muted">Manage the backend from one place.</p>
          </div>
          <div id="profileLabel" class="pill"></div>
        </header>

        <section class="grid cards">
          <article class="stat card"><span>Users</span><strong id="totalUsers">0</strong></article>
          <article class="stat card"><span>Orders</span><strong id="totalOrders">0</strong></article>
          <article class="stat card"><span>Revenue</span><strong id="totalRevenue">0</strong></article>
          <article class="stat card"><span>Products</span><strong id="totalProducts">0</strong></article>
        </section>

        <section class="grid two-col">
          <article class="card panel" id="leftPanel"></article>
          <article class="card panel" id="rightPanel"></article>
        </section>
      </section>
    </main>
  </div>

  <template id="dashboardTemplate">
    <div>
      <div class="chart-card">
        <div class="chart-header">
          <h2>User Mix</h2>
          <span id="userRoleTotal" class="pill">0 total</span>
        </div>
        <div class="chart-body">
          <div id="userRoleChart" class="donut-chart"></div>
          <div id="userRoleLegend" class="legend"></div>
        </div>
      </div>

      <div class="chart-card">
        <div class="chart-header">
          <h2>Recent Orders</h2>
          <span class="pill">Latest 5</span>
        </div>
        <div id="recentOrders" class="table"></div>
      </div>
    </div>
    <div>
      <div class="chart-card">
        <div class="chart-header">
          <h2>Order Status</h2>
          <span id="orderStatusTotal" class="pill">0 total</span>
        </div>
        <div class="chart-body">
          <div id="orderStatusChart" class="donut-chart"></div>
          <div id="orderStatusLegend" class="legend"></div>
        </div>
      </div>

      <div class="chart-card">
        <div class="chart-header">
          <h2>Monthly Sales</h2>
          <span class="pill">Revenue</span>
        </div>
        <div id="salesChart"></div>
        <div id="salesList" class="list"></div>
      </div>
    </div>
  </template>

  <template id="productsTemplate">
    <div>
      <h2>Add Product</h2>
      <form id="productForm" class="stack">
        <input name="name" placeholder="Name" required />
        <input name="category" placeholder="Category" required />
        <input name="price" type="number" step="0.01" placeholder="Price" required />
        <input name="stock" type="number" placeholder="Stock" value="0" />
        <textarea name="description" placeholder="Description"></textarea>
        <input name="sizes" placeholder='Sizes as JSON, e.g. ["S","M"]' />
        <input name="colors" placeholder='Colors as JSON, e.g. ["Red","Black"]' />
        <label>Image <input name="image" type="file" accept="image/*" required /></label>
        <label>Try-on Image <input name="tryOnImage" type="file" accept="image/*" /></label>
        <button type="submit">Create Product</button>
      </form>
      <div id="productMsg" class="message"></div>
    </div>
    <div>
      <h2>All Products</h2>
      <div id="productsList" class="table"></div>
    </div>
  </template>

  <template id="ordersTemplate">
    <div>
      <h2>All Orders</h2>
      <div id="ordersList" class="table"></div>
    </div>
    <div>
      <h2>Order Status Guide</h2>
      <div class="list">
        <div>Placed</div>
        <div>Packed</div>
        <div>Shipped</div>
        <div>Delivered</div>
      </div>
    </div>
  </template>

  <template id="usersTemplate">
    <div>
      <h2>Users</h2>
      <div id="usersList" class="table"></div>
    </div>
    <div>
      <h2>Role Breakdown</h2>
      <div id="userBreakdown" class="list"></div>
    </div>
  </template>

  <script src="/admin/app.js"></script>
</body>
</html>
